<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Green accent bar left -->
  <rect x="0" y="0" width="8" height="630" fill="#25D366"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Green glow circle -->
  <circle cx="1050" cy="120" r="280" fill="#25D366" opacity="0.06"/>

  <!-- Logo area -->
  <rect x="80" y="100" width="64" height="64" rx="14" fill="#25D366"/>
  <text x="112" y="140" text-anchor="middle" dominant-baseline="middle" font-family="Arial" font-weight="bold" font-size="28" fill="#062810">QE</text>

  <!-- Brand name -->
  <text x="80" y="230" font-family="Arial" font-weight="bold" font-size="56" fill="#ffffff" letter-spacing="-1">Quick Emigrate</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="Arial" font-size="30" fill="#ffffff" opacity="0.55">Diagnóstico migratorio con IA para emigrar a España</text>

  <!-- Divider -->
  <rect x="80" y="365" width="120" height="3" fill="#25D366" rx="2"/>

  <!-- Value props -->
  <text x="80" y="420" font-family="Arial" font-size="22" fill="#25D366" font-weight="bold">✓</text>
  <text x="110" y="420" font-family="Arial" font-size="22" fill="#ffffff" opacity="0.7">Visado exacto para tu perfil</text>

  <text x="80" y="460" font-family="Arial" font-size="22" fill="#25D366" font-weight="bold">✓</text>
  <text x="110" y="460" font-family="Arial" font-size="22" fill="#ffffff" opacity="0.7">Checklist de documentos personalizado</text>

  <text x="80" y="500" font-family="Arial" font-size="22" fill="#25D366" font-weight="bold">✓</text>
  <text x="110" y="500" font-family="Arial" font-size="22" fill="#ffffff" opacity="0.7">Probabilidad real de éxito</text>

  <!-- Price badge -->
  <rect x="900" y="460" width="220" height="90" rx="16" fill="#25D366"/>
  <text x="1010" y="497" text-anchor="middle" font-family="Arial" font-size="18" fill="#062810" opacity="0.75">Solo</text>
  <text x="1010" y="535" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="38" fill="#062810">19€</text>

  <!-- URL -->
  <text x="80" y="590" font-family="Arial" font-size="20" fill="#ffffff" opacity="0.3">quickemigrate.com</text>
</svg>
